<title>Daily Build</title>
<style>
  :root{
    --bg: #0d0d0f;
    --panel: #17171b;
    --line: #2a2a2f;
    --red: #d13b2e;
    --text: #ececec;
    --dim: #8a8a90;
    --done: #3fae5a;
    --partial: #b8862e;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Roboto, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
    padding-bottom: 60px;
  }
  header {
    padding: 22px 18px 16px;
    border-bottom: 2px solid var(--red);
  }
  header h1 {
    margin: 0 0 4px;
    font-size: 22px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 800;
  }
  #datetime { color: var(--dim); font-size: 13px; }
  #weekbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  #weekbar .label { font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px;}
  #weekbar .value { font-size: 20px; font-weight: 800; color: var(--red); }
  #weekbar .streak { font-size: 20px; font-weight: 800; color: #e0a83f; }

  nav#tabs { display: flex; background: var(--panel); border-bottom: 1px solid var(--line); }
  nav#tabs button {
    flex: 1; background: none; border: none; color: var(--dim);
    font-size: 13px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; padding: 12px 4px; border-bottom: 3px solid transparent;
  }
  nav#tabs button.active { color: var(--text); border-bottom: 3px solid var(--red); }

  section.view { display: none; padding: 14px 16px 4px; }
  section.view.active { display: block; }

  .group-title {
    font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--red); font-weight: 700; margin: 18px 0 8px;
  }
  .item {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 8px;
  }
  .item { cursor: pointer; }
  .item.done { border-color: var(--done); background: #123822; }
  .item-text { flex: 1; }
  .item-name { font-size: 15px; font-weight: 600; }
  .item-reps { font-size: 13px; color: var(--dim); margin-top: 2px; }
  .item.done .item-reps { color: #8fe0a5; }

  .tick {
    width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--line);
    background: transparent; flex-shrink: 0; margin-left: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: transparent; transition: all 0.15s ease;
  }
  .tick.done { border-color: var(--done); background: var(--done); color: #fff; }

  #progress { padding: 4px 0 10px; }
  #progress-bar-bg { width: 100%; height: 8px; background: var(--line); border-radius: 4px; overflow: hidden; }
  #progress-bar-fill { height: 100%; background: var(--red); width: 0%; transition: width 0.2s ease; }
  #progress-text { font-size: 12px; color: var(--dim); margin-top: 4px; }

  .bonus-item {
    cursor: pointer;
    background: var(--panel); border: 1px solid var(--red); border-radius: 10px;
    padding: 12px 14px; margin: 16px 0 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .bonus-item.done { border-color: var(--done); background: #123822; }
  .bonus-item .item-name { font-size: 15px; font-weight: 700; }
  .bonus-item .item-reps { font-size: 12px; color: var(--dim); }

  #stretch-note-foot { padding: 14px 0 30px; color: var(--dim); font-size: 12px; line-height: 1.5; }
  #reset {
    display: block; margin: 10px auto 0; background: none; border: 1px solid var(--line);
    color: var(--dim); font-size: 11px; padding: 6px 14px; border-radius: 20px;
  }

  .hist-row {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 6px; font-size: 14px;
  }
  .hist-date { font-weight: 600; }
  .hist-stat { font-size: 12px; color: var(--dim); }
  .hist-row.full { border-color: var(--done); }
  .hist-row.partial { border-color: var(--partial); }
  .hist-row.none { border-color: var(--line); opacity: 0.6; }

  #cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  #cal-header button {
    background: var(--panel); border: 1px solid var(--line); color: var(--text);
    border-radius: 8px; padding: 6px 12px; font-size: 16px;
  }
  #cal-title { font-weight: 700; font-size: 15px; }
  #streak-banner {
    text-align: center; background: var(--panel); border: 1px solid var(--red);
    border-radius: 10px; padding: 14px; margin-bottom: 14px;
  }
  #streak-banner .num { font-size: 32px; font-weight: 800; color: var(--red); }
  #streak-banner .lbl { font-size: 12px; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-dow { text-align: center; font-size: 11px; color: var(--dim); padding-bottom: 4px; }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 8px; font-size: 13px; background: var(--panel); border: 1px solid var(--line);
  }
  .cal-day.empty { background: transparent; border: none; }
  .cal-day.full { background: var(--done); border-color: var(--done); font-weight: 700; }
  .cal-day.partial { background: var(--partial); border-color: var(--partial); }
  .cal-day.today { box-shadow: 0 0 0 2px var(--red) inset; }
  .cal-day.selectable { cursor: pointer; }
  .cal-day.selected { box-shadow: 0 0 0 2px #fff inset; }

  #cal-detail {
    margin-top: 16px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px;
  }
  #cal-detail.hidden { display: none; }
  #cal-detail .cd-title { font-weight: 700; font-size: 15px; margin-bottom: 8px; }
  #cal-detail .cd-stat { font-size: 12px; color: var(--dim); margin-bottom: 10px; }
  .cd-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 0; border-bottom: 1px solid var(--line); font-size: 13px;
  }
  .cd-row:last-child { border-bottom: none; }
  .cd-check { font-size: 15px; }
  .cd-check.yes { color: var(--done); }
  .cd-check.no { color: var(--dim); }
</style>
</head>
<body>

<header>
  <h1>Daily Build</h1>
  <div id="datetime">--</div>
</header>

<div id="weekbar">
  <div>
    <div class="label">Week</div>
    <div class="value" id="weekNum">1</div>
  </div>
  <div>
    <div class="label">Streak</div>
    <div class="streak" id="streakQuick">0</div>
  </div>
  <div style="text-align:right">
    <div class="label">Reps today</div>
    <div class="value" id="repNum">10</div>
  </div>
</div>

<nav id="tabs">
  <button class="active" data-view="today">Today</button>
  <button data-view="history">History</button>
  <button data-view="calendar">Calendar</button>
</nav>

<section class="view active" id="view-today">
  <div class="bonus-item" id="bonus-100">
    <div>
      <div class="item-name">100 Push-ups Challenge</div>
      <div class="item-reps">One-off, any time today</div>
    </div>
    <button class="tick" data-id="bonus100">✓</button>
  </div>

  <div id="progress">
    <div id="progress-bar-bg"><div id="progress-bar-fill"></div></div>
    <div id="progress-text">0 / 0 done</div>
  </div>

  <div id="exercise-list"></div>

  <div class="group-title">Stretch</div>
  <div id="stretch-list"></div>

  <div id="stretch-note-foot">
    Ticks reset automatically at midnight UK time. Reps and holds go up automatically each week from your start date.
  </div>

  <button id="reset">Reset week counter to Week 1 (today)</button>
</section>

<section class="view" id="view-history">
  <div class="group-title">Day by day</div>
  <div id="history-list"></div>
</section>

<section class="view" id="view-calendar">
  <div id="streak-banner">
    <div class="num" id="streakBig">0</div>
    <div class="lbl">Day Streak</div>
  </div>
  <div id="cal-header">
    <button id="calPrev">‹</button>
    <div id="cal-title">--</div>
    <button id="calNext">›</button>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div id="cal-detail"></div>
</section>

<script>
const TZ = 'Europe/London';

const GROUPS = [
  { title: "Neck & Shoulders", items: [
    { id: "neck", name: "Neck rolls", unit: "each way" },
    { id: "shrug", name: "Trap shrugs", unit: "" },
    { id: "thold", name: "Shoulder T-hold", unit: "hold", isHold: true },
    { id: "front", name: "Front raises", unit: "" },
    { id: "rear", name: "Rear delt raises", unit: "" },
  ]},
  { title: "Push", items: [
    { id: "pushup", name: "Push-ups (slow)", unit: "" },
    { id: "pseudo", name: "Pseudo push-ups (slow)", unit: "" },
    { id: "diamond", name: "Diamond push-ups (slow)", unit: "" },
  ]},
  { title: "Back", items: [
    { id: "suphold", name: "Superman hold", unit: "hold", isHold: true },
    { id: "supraise", name: "Superman raises", unit: "" },
    { id: "swim", name: "Swimmers", unit: "each side" },
    { id: "snowangel", name: "Reverse snow angels", unit: "" },
    { id: "yraise", name: "Prone Y-raises", unit: "" },
    { id: "wraise", name: "Prone W-raises", unit: "" },
    { id: "revplank", name: "Reverse plank hold", unit: "hold", isHold: true },
    { id: "goodmorn", name: "Bodyweight good mornings", unit: "" },
  ]},
  { title: "Core", items: [
    { id: "crunch", name: "Crunches", unit: "" },
    { id: "plank", name: "Plank", unit: "hold", isHold: true },
    { id: "legraise", name: "Leg raises", unit: "" },
    { id: "rtwist", name: "Russian twists", unit: "each side" },
    { id: "bicycle", name: "Bicycle crunches", unit: "each side" },
    { id: "flutter", name: "Flutter kicks", unit: "" },
    { id: "mtnclimb", name: "Mountain climbers", unit: "each side" },
    { id: "hollow", name: "Hollow body hold", unit: "hold", isHold: true },
  ]},
  { title: "Legs", items: [
    { id: "squat", name: "Slow squats (3s down)", unit: "" },
    { id: "calf", name: "Calf raises", unit: "" },
  ]},
];

const STRETCHES = [
  { id: "s_neck", name: "Neck side stretch", label: "20s each side" },
  { id: "s_shoulder", name: "Cross-body shoulder stretch", label: "20s each arm" },
  { id: "s_cobra", name: "Cobra stretch", label: "20s" },
  { id: "s_quad", name: "Standing quad stretch", label: "20s each leg" },
  { id: "s_ham", name: "Toe touch / hamstring", label: "20s" },
  { id: "s_catcow", name: "Cat-cow", label: "8 reps" },
];

function ukDateString(d) {
  const fmt = new Intl.DateTimeFormat('en-GB', { timeZone: TZ, year: 'numeric', month: '2-digit', day: '2-digit' });
  const parts = fmt.formatToParts(d);
  const y = parts.find(p => p.type === 'year').value;
  const m = parts.find(p => p.type === 'month').value;
  const day = parts.find(p => p.type === 'day').value;
  return `${y}-${m}-${day}`;
}

function daysBetween(dateStrA, dateStrB) {
  const a = new Date(dateStrA + 'T00:00:00Z');
  const b = new Date(dateStrB + 'T00:00:00Z');
  return Math.round((b - a) / 86400000);
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T00:00:00Z');
  d.setUTCDate(d.getUTCDate() + n);
  return d.toISOString().slice(0, 10);
}

const now = new Date();
const todayStr = ukDateString(now);

let startDate = localStorage.getItem('build_start_date');
if (!startDate) {
  startDate = todayStr;
  localStorage.setItem('build_start_date', startDate);
}

const daysSinceStart = daysBetween(startDate, todayStr);
const weekIndex = Math.floor(daysSinceStart / 7);
const weekNum = weekIndex + 1;
const reps = 10 + 5 * weekIndex;
const holdSec = 20 + 5 * weekIndex;

function renderClock() {
  const n = new Date();
  const dateFmt = new Intl.DateTimeFormat('en-GB', { timeZone: TZ, weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
  const timeFmt = new Intl.DateTimeFormat('en-GB', { timeZone: TZ, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  document.getElementById('datetime').textContent = `${dateFmt.format(n)} — ${timeFmt.format(n)} UK`;
}
renderClock();
setInterval(renderClock, 1000);

document.getElementById('weekNum').textContent = weekNum;
document.getElementById('repNum').textContent = reps;

const ticksKey = `build_ticks_${todayStr}`;
let ticks = JSON.parse(localStorage.getItem(ticksKey) || '{}');

function saveTicks() { localStorage.setItem(ticksKey, JSON.stringify(ticks)); }

function repLabel(item) {
  if (item.isHold) return `3 x ${holdSec}s`;
  return `${reps} reps${item.unit ? ' ' + item.unit : ''}`;
}

const ITEM_NAMES = {};
GROUPS.forEach(g => g.items.forEach(i => ITEM_NAMES[i.id] = i.name));
STRETCHES.forEach(s => ITEM_NAMES[s.id] = s.name);
ITEM_NAMES['bonus100'] = '100 Push-ups Challenge';

const listEl = document.getElementById('exercise-list');
let allIds = [];

GROUPS.forEach(group => {
  const h = document.createElement('div');
  h.className = 'group-title';
  h.textContent = group.title;
  listEl.appendChild(h);

  group.items.forEach(item => {
    allIds.push(item.id);
    const row = document.createElement('div');
    row.className = 'item' + (ticks[item.id] ? ' done' : '');
    row.id = 'row-' + item.id;
    row.innerHTML = `
      <div class="item-text">
        <div class="item-name">${item.name}</div>
        <div class="item-reps">${repLabel(item)}</div>
      </div>
      <button class="tick ${ticks[item.id] ? 'done' : ''}" data-id="${item.id}">✓</button>
    `;
    listEl.appendChild(row);
  });
});

const stretchListEl = document.getElementById('stretch-list');
STRETCHES.forEach(item => {
  allIds.push(item.id);
  const row = document.createElement('div');
  row.className = 'item' + (ticks[item.id] ? ' done' : '');
  row.id = 'row-' + item.id;
  row.innerHTML = `
    <div class="item-text">
      <div class="item-name">${item.name}</div>
      <div class="item-reps">${item.label}</div>
    </div>
    <button class="tick ${ticks[item.id] ? 'done' : ''}" data-id="${item.id}">✓</button>
  `;
  stretchListEl.appendChild(row);
});

const bonusEl = document.getElementById('bonus-100');
if (ticks['bonus100']) bonusEl.classList.add('done');
bonusEl.querySelector('.tick').classList.toggle('done', !!ticks['bonus100']);

function updateProgress() {
  const doneCount = allIds.filter(id => ticks[id]).length;
  const total = allIds.length;
  const pct = total ? Math.round((doneCount / total) * 100) : 0;
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${doneCount} / ${total} done`;
}

document.getElementById('view-today').addEventListener('click', (e) => {
  const row = e.target.closest('.item, .bonus-item');
  if (!row) return;
  const btn = row.querySelector('.tick');
  if (!btn) return;
  const id = btn.dataset.id;
  ticks[id] = !ticks[id];
  saveTicks();
  btn.classList.toggle('done', ticks[id]);
  row.classList.toggle('done', ticks[id]);
  updateProgress();
  computeStreak();
});

updateProgress();

document.getElementById('reset').addEventListener('click', () => {
  if (confirm("Reset your week counter back to Week 1 starting today?")) {
    localStorage.setItem('build_start_date', todayStr);
    location.reload();
  }
});

const tabButtons = document.querySelectorAll('#tabs button');
tabButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    tabButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('section.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + btn.dataset.view).classList.add('active');
    if (btn.dataset.view === 'history') renderHistory();
    if (btn.dataset.view === 'calendar') renderCalendar();
  });
});

function getAllLoggedDays() {
  const days = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('build_ticks_')) {
      const dateStr = key.replace('build_ticks_', '');
      const data = JSON.parse(localStorage.getItem(key) || '{}');
      const doneCount = allIds.filter(id => data[id]).length;
      days[dateStr] = { data, doneCount, total: allIds.length };
    }
  }
  return days;
}

function dayStatus(entry) {
  if (!entry) return 'none';
  if (entry.doneCount === 0) return 'none';
  if (entry.doneCount >= entry.total) return 'full';
  return 'partial';
}

function renderHistory() {
  const days = getAllLoggedDays();
  const sortedDates = Object.keys(days).sort().reverse();
  const el = document.getElementById('history-list');
  el.innerHTML = '';
  if (sortedDates.length === 0) {
    el.innerHTML = '<div class="hist-row"><span>No days logged yet.</span></div>';
    return;
  }
  sortedDates.forEach(dateStr => {
    const entry = days[dateStr];
    const status = dayStatus(entry);
    const row = document.createElement('div');
    row.className = 'hist-row ' + status;
    const d = new Date(dateStr + 'T00:00:00Z');
    const label = d.toLocaleDateString('en-GB', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric', timeZone: 'UTC' });
    row.innerHTML = `
      <div>
        <div class="hist-date">${label}${dateStr === todayStr ? ' (today)' : ''}</div>
        <div class="hist-stat">${entry.doneCount} / ${entry.total} done${entry.data.bonus100 ? ' · 100 push-ups ✓' : ''}</div>
      </div>
    `;
    el.appendChild(row);
  });
}

function computeStreak() {
  const days = getAllLoggedDays();
  let streak = 0;
  let cursor = todayStr;
  while (true) {
    const entry = days[cursor];
    if (entry && dayStatus(entry) === 'full') {
      streak++;
      cursor = addDays(cursor, -1);
    } else if (cursor === todayStr) {
      cursor = addDays(cursor, -1);
      continue;
    } else {
      break;
    }
  }
  document.getElementById('streakQuick').textContent = streak;
  const bigEl = document.getElementById('streakBig');
  if (bigEl) bigEl.textContent = streak;
  return streak;
}
computeStreak();

let calViewDate = new Date(todayStr + 'T00:00:00Z');
let selectedDate = null;

function renderDayDetail(dateStr, days) {
  const panel = document.getElementById('cal-detail');
  const entry = days[dateStr];
  if (!entry) {
    const d = new Date(dateStr + 'T00:00:00Z');
    const label = d.toLocaleDateString('en-GB', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric', timeZone: 'UTC' });
    panel.classList.remove('hidden');
    panel.innerHTML = `<div class="cd-title">${label}</div><div class="cd-stat">Nothing logged this day.</div>`;
    return;
  }
  const d = new Date(dateStr + 'T00:00:00Z');
  const label = d.toLocaleDateString('en-GB', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric', timeZone: 'UTC' });
  let rows = '';
  Object.keys(ITEM_NAMES).forEach(id => {
    const checked = !!entry.data[id];
    rows += `<div class="cd-row"><span>${ITEM_NAMES[id]}</span><span class="cd-check ${checked ? 'yes' : 'no'}">${checked ? '✓' : '—'}</span></div>`;
  });
  panel.classList.remove('hidden');
  panel.innerHTML = `
    <div class="cd-title">${label}</div>
    <div class="cd-stat">${entry.doneCount} / ${entry.total} done</div>
    ${rows}
  `;
}

function renderCalendar() {
  const days = getAllLoggedDays();
  const year = calViewDate.getUTCFullYear();
  const month = calViewDate.getUTCMonth();

  const monthName = calViewDate.toLocaleDateString('en-GB', { month: 'long', year: 'numeric', timeZone: 'UTC' });
  document.getElementById('cal-title').textContent = monthName;

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(dow => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = dow;
    grid.appendChild(el);
  });

  const firstOfMonth = new Date(Date.UTC(year, month, 1));
  let firstWeekday = firstOfMonth.getUTCDay();
  firstWeekday = firstWeekday === 0 ? 6 : firstWeekday - 1;

  for (let i = 0; i < firstWeekday; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  const daysInMonth = new Date(Date.UTC(year, month + 1, 0)).getUTCDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const entry = days[dateStr];
    const status = dayStatus(entry);
    const el = document.createElement('div');
    el.className = 'cal-day selectable ' + status;
    if (dateStr === todayStr) el.classList.add('today');
    if (dateStr === selectedDate) el.classList.add('selected');
    el.textContent = d;
    el.dataset.date = dateStr;
    el.addEventListener('click', () => {
      selectedDate = dateStr;
      renderCalendar();
      renderDayDetail(dateStr, days);
    });
    grid.appendChild(el);
  }

  document.getElementById('streakBig').textContent = computeStreak();

  if (selectedDate) {
    renderDayDetail(selectedDate, days);
  } else {
    document.getElementById('cal-detail').classList.add('hidden');
  }
}

document.getElementById('calPrev').addEventListener('click', () => {
  calViewDate = new Date(Date.UTC(calViewDate.getUTCFullYear(), calViewDate.getUTCMonth() - 1, 1));
  renderCalendar();
});
document.getElementById('calNext').addEventListener('click', () => {
  calViewDate = new Date(Date.UTC(calViewDate.getUTCFullYear(), calViewDate.getUTCMonth() + 1, 1));
  renderCalendar();
});
</script>

</body>
</html>
